<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brick Breaker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>ブロック崩し</h1>
      <p class="subtitle">矢印キーで動かし、スペースで始めます。</p>

      <canvas id="gameCanvas" width="480" height="360"></canvas>

      <div class="info-row">
        <div>得点: <span id="score">0</span></div>
        <div id="status">スペースで開始</div>
      </div>

      <button id="restartButton">もう一度遊ぶ</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
