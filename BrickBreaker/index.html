<!DOCTYPE html>
<!--
  このファイルは、ゲームの見た目を組み立てる土台です。
  HTMLは「何を画面に出すか」を決める役割があり、
  ここではタイトル、点数、キャンバス、スタート画面、ボタンを配置しています。
-->
<html lang="ja">
  <head>
    <!-- 文字コードを日本語向けに設定します。 -->
    <meta charset="UTF-8" />
    <!-- スマートフォンで見たときに画面サイズに合わせて表示するための設定です。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BrickBreaker</title>
    <!-- 見た目を整える CSS を読み込みます。 -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!--
      全体のレイアウトをまとめるためのコンテナです。
      画面の中央にゲームカードが表示されるようにしています。
    -->
    <main class="app-shell">
      <!--
        ゲーム本体を囲むカードです。
        ここに HUD（点数や残機）とキャンバスを並べます。
      -->
      <section class="game-card">
        <header class="game-header">
          <div class="title-block">
            <p class="eyebrow">WORKSHOP BUILD</p>
            <h1>BrickBreaker</h1>
            <p class="subtitle">見た目でひきつけて、遊びながら少しずつ強くなるたたき台です。</p>
          </div>
          <div class="stage-card" aria-live="polite">
            <span class="stage-label">STAGE</span>
            <strong id="stageBadge">1 / 3</strong>
            <span id="stageName">準備中</span>
          </div>
        </header>

        <!-- 得点と残機を表示する部分です。 -->
        <div class="hud">
          <div class="stat">
            <span>スコア</span>
            <!-- JavaScript から中身を更新するための ID です。aria-live で得点変化を読み上げさせます。 -->
            <strong id="score" aria-live="polite">0</strong>
          </div>
          <div class="stat">
            <span>ライフ</span>
            <strong id="lives" aria-live="polite">3</strong>
          </div>
        </div>

        <div class="stage-progress" aria-hidden="true">
          <div id="stageProgress" class="stage-progress-fill"></div>
        </div>

        <!--
          ゲーム画面そのものです。
          Canvas は JavaScript で絵を描くための場所です。
        -->
        <div class="canvas-wrap">
          <!-- 実際のゲーム描画先です。幅と高さを指定しています。 -->
          <canvas id="gameCanvas" width="360" height="520"></canvas>
          <!--
            ゲーム開始前やゲームオーバー時に表示するオーバーレイです。
            ここに「タップしてスタート」などのメッセージを出します。
          -->
          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <h1>BrickBreaker</h1>
              <p id="overlayText" aria-live="assertive">タップしてスタート</p>
            </div>
          </div>
        </div>

        <!-- 下部の操作説明と再スタートボタンです。 -->
        <div class="controls">
          <p>左右に動かして、ブロックを全部こわそう。</p>
          <button id="restartBtn" type="button">もう一度チャレンジ</button>
        </div>
      </section>
    </main>

    <!--
      通常の <script> タグで読み込みます（ES Modules は使いません）。
      file:// で直接開いた場合でも、ブラウザの CORS 制限に
      引っかからずに動かせるようにするためです。
      各ファイルは window.BB という名前空間に自分の機能を公開し、
      あとから読み込むファイルがそれを利用する仕組みなので、
      読み込む順番（設定 → 部品 → まとめ役）が大切です。
    -->
    <script src="config.js"></script>
    <script src="collision.js"></script>
    <script src="entities.js"></script>
    <script src="render.js"></script>
    <script src="input.js"></script>
    <script src="events.js"></script>
    <script src="game.js"></script>
  </body>
</html>
